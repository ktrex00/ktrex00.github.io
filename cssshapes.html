<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Shapes</title>

    <style>
        .fish {
        position: relative;
        width: clamp(50px, 25vw, 1200px);
        height: clamp(50px, 25vh, 1200px);
        }
        .body{
            position:absolute;
            width:300px;
            height:300px;
            background-color: teal;
            clip-path: polygon(0% 50%, 80% 20%, 80% 80%)
        }
        .tail{
            position:absolute;
            width: 150px;
            height: 300px;
            top: 0px;
            left: 240px;
            background-color: salmon;
            clip-path: polygon(0% 50%,
                                100% 0%,
                                75% 50%, 
                                100% 100%);
            animation: fin-swish 1s ease infinite;
        }
        @keyframes fin-swish {
            0% {
                clip-path:polygon(0% 50%,
                        50% 20%,
                        35% 50%, 
                        50% 80%);
            }
            25% {
                clip-path:polygon(0% 50%,
                        35% 5%,
                        25% 50%, 
                        35% 95%);
            }
            50% {
                clip-path:polygon(0% 50%,
                        50% 20%,
                        35% 50%, 
                        50% 80%);
            }
            75% {
                clip-path:polygon(0% 50%,
                        25% 30%,
                        20% 50%, 
                        25% 70%);
            }
            100% {
                clip-path:polygon(0% 50%,
                        50% 20%,
                        35% 50%, 
                        50% 80%);
            }
            }
        .pec{
            position:absolute;
            top:165px;
            left:80px;
            width:75px;
            height:100px;
            background-color: pink;
            clip-path: polygon(0% 0%, 100% 25%, 70% 40%, 60% 75%)
        }
        .dorsal{
            position:absolute;
            top: 38px;
            left:100px;
            width:75px;
            height:75px;
            background-color: pink;
            clip-path: polygon(0% 100%, 40% 25%, 100% 61%)
        }
    </style>
</head>
<body>
    <div class="fish">
        <div class="body"></div>
        <div class="tail"></div>
        <div class="pec"></div>   
        <div class="dorsal"></div>
    </div>

        const box = document.querySelector('.fish');
        const coordsEl = document.getElementById('coords');
        box.addEventListener('mousemove', function(e) {

    </script>


</body>
</html>
